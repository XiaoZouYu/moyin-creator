services:
  postgres:
    image: postgres:16-alpine
    container_name: moyin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moyin_creator}
      POSTGRES_USER: ${POSTGRES_USER:-moyin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moyin_local_password}
    ports:
      # Exposed only for local development tools. The app container uses the
      # internal Docker service address postgres:5432 and does not need this
      # host port. Use 15432 by default to avoid conflicts with server PostgreSQL.
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - moyin-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moyin} -d ${POSTGRES_DB:-moyin_creator}"]
      interval: 10s
      timeout: 5s
      retries: 5

  moyin-creator:
    build:
      context: .
      dockerfile: Dockerfile
    image: moyin-creator:latest
    container_name: moyin-creator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8088
      CLOUD_STORAGE_DRIVER: ${CLOUD_STORAGE_DRIVER:-local}
      CLOUD_STORAGE_DIR: ${CLOUD_STORAGE_DIR:-/app/.cache/cloud-storage}
      CLOUD_MEDIA_DRIVER: ${CLOUD_MEDIA_DRIVER:-local}
      CLOUD_MEDIA_DIR: ${CLOUD_MEDIA_DIR:-/app/.cache/cloud-media}
      GENERATION_TASK_STORE_DIR: ${GENERATION_TASK_STORE_DIR:-/app/.cache/generation-tasks}
      MAX_PROXY_BODY_BYTES: 52428800
      MAX_CLOUD_BODY_BYTES: ${MAX_CLOUD_BODY_BYTES:-209715200}
      DATABASE_URL: postgresql://${POSTGRES_USER:-moyin}:${POSTGRES_PASSWORD:-moyin_local_password}@postgres:5432/${POSTGRES_DB:-moyin_creator}
      CLOUD_STORAGE_TABLE: ${CLOUD_STORAGE_TABLE:-moyin_user_storage}
      ALI_OSS_BUCKET: ${ALI_OSS_BUCKET:-}
      ALI_OSS_REGION: ${ALI_OSS_REGION:-oss-cn-chengdu}
      ALI_OSS_PREFIX: ${ALI_OSS_PREFIX:-mj/}
      ALI_OSS_ACCESS_KEY_ID: ${ALI_OSS_ACCESS_KEY_ID:-}
      ALI_OSS_ACCESS_KEY_SECRET: ${ALI_OSS_ACCESS_KEY_SECRET:-}
      ALI_OSS_SIGNED_URL_EXPIRES: ${ALI_OSS_SIGNED_URL_EXPIRES:-86400}
    ports:
      - "8088:8088"

volumes:
  moyin-postgres-data:
